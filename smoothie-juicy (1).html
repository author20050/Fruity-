<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmoothieJuicy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #E8621A;
    --orange-light: #F5924A;
    --orange-pale: #FFF3EC;
    --dark: #1A1108;
    --mid: #6B4226;
    --text: #2C1A0E;
    --gray: #9A8F87;
    --white: #FFFFFF;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F9F5F2;
    color: var(--text);
    min-height: 100vh;
  }
  .page {
    max-width: 780px;
    margin: 0 auto;
    background: var(--white);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 0.5px solid #E8D8CE;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--dark);
    letter-spacing: -0.5px;
  }
  .nav-links { display: flex; gap: 24px; }
  .nav-links a {
    font-size: 13px;
    color: var(--gray);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--orange); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .cart-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--orange);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px;
  }
  .theme-dots { display: flex; gap: 6px; }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .dot:hover { transform: scale(1.2); }
  .dot.active { outline: 2px solid var(--dark); outline-offset: 2px; }

  /* HERO */
  .hero-section {
    margin: 24px 32px;
    border-radius: 16px;
    background: var(--orange);
    padding: 28px 28px 0;
    overflow: hidden;
    position: relative;
    min-height: 200px;
    transition: background 0.4s ease;
  }
  .hero-bg-text {
    position: absolute;
    right: -10px; bottom: -10px;
    font-family: 'Playfair Display', serif;
    font-size: 100px;
    font-weight: 700;
    color: rgba(0,0,0,0.1);
    line-height: 1;
    pointer-events: none;
    white-space: nowrap;
    transition: opacity 0.3s;
  }
  .hero-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
  }
  .hero-name {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--white);
    margin-top: 6px;
    line-height: 1.1;
  }
  .hero-desc {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    margin-top: 8px;
    max-width: 200px;
    line-height: 1.6;
  }
  .hero-price {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--white);
    margin-top: 12px;
  }
  .hero-price small {
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    opacity: 0.7;
    text-decoration: line-through;
    margin-left: 8px;
  }
  .add-btn {
    background: var(--white);
    color: var(--orange);
    border: none;
    border-radius: 24px;
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 14px;
    margin-bottom: 24px;
    font-family: 'DM Sans', sans-serif;
    transition: transform 0.15s;
  }
  .add-btn:hover { transform: scale(1.03); }
  .add-btn:active { transform: scale(0.97); }
  .hero-bottle {
    position: absolute;
    right: 28px; bottom: 0;
    width: 100px;
  }
  .size-btns {
    position: absolute;
    right: 140px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .size-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.4);
    background: transparent;
    color: white;
    font-size: 10px;
    cursor: pointer;
    transition: background 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .size-btn.active, .size-btn:hover {
    background: rgba(255,255,255,0.3);
    border-color: rgba(255,255,255,0.9);
  }
  .flavor-thumbs {
    position: absolute;
    bottom: 16px; right: 16px;
    display: flex; gap: 6px;
  }
  .thumb {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    transition: border-color 0.2s;
  }
  .thumb:hover { border-color: rgba(255,255,255,0.9); }

  /* PRODUCTS */
  .products-section { padding: 8px 32px 32px; }
  .section-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gray);
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--dark);
    margin-top: 4px;
  }

  /* CARDS */
  .cards-track {
    display: flex;
    gap: 0;
    overflow: hidden;
    border-radius: 16px;
    cursor: pointer;
    user-select: none;
  }
  .product-card {
    flex: 0 0 22%;
    padding: 20px 16px 16px;
    background: var(--white);
    border: 0.5px solid #EDE0D8;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .product-card.active {
    flex: 0 0 34%;
    border-color: transparent;
  }
  .product-card:first-child { border-radius: 16px 0 0 16px; }
  .product-card:last-child  { border-radius: 0 16px 16px 0; }

  .card-num {
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 1px;
    margin-bottom: 12px;
    transition: color 0.35s;
  }
  .product-card.active .card-num { color: rgba(255,255,255,0.6); }

  .card-img-wrap {
    height: 90px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
  }
  .bottle-svg {
    width: 48px;
    transition: transform 0.35s;
  }
  .product-card.active .bottle-svg { transform: scale(1.2) translateY(-4px); }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.3;
    transition: color 0.35s;
  }
  .product-card.active .card-name { color: var(--white); }

  .card-sub {
    font-size: 11px;
    color: var(--gray);
    margin-top: 2px;
    transition: color 0.35s;
  }
  .product-card.active .card-sub { color: rgba(255,255,255,0.7); }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
  }
  .view-btn {
    font-size: 11px;
    color: var(--gray);
    display: flex; align-items: center; gap: 4px;
    transition: color 0.35s;
    cursor: pointer;
  }
  .product-card.active .view-btn { color: rgba(255,255,255,0.8); }

  /* DOTS */
  .dots-row {
    display: flex; gap: 6px;
    align-items: center; justify-content: center;
    margin-top: 20px;
  }
  .nav-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #D5C5BC;
    transition: all 0.3s;
    cursor: pointer;
  }
  .nav-dot.active-dot {
    background: var(--orange);
    width: 18px;
    border-radius: 3px;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: var(--gray);
    border-top: 0.5px solid #EDE0D8;
  }
</style>
</head>
<body>
<div class="page">

  <nav>
    <div class="logo">SmoothieJuicy</div>
    <div class="nav-links">
      <a class="active">Products</a>
      <a>Contact</a>
    </div>
    <div class="nav-right">
      <div class="theme-dots" id="themeDots"></div>
      <button class="cart-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
      </button>
    </div>
  </nav>

  <div class="hero-section" id="heroSection">
    <div class="hero-bg-text" id="heroBgText">drink</div>
    <div class="hero-label" id="heroNum">03</div>
    <div class="hero-name" id="heroName">Orange Smoothie</div>
    <div class="hero-desc" id="heroDesc">Experience the perfect blend of fresh oranges &amp; creamy vanilla, packed with vitamins.</div>
    <div class="hero-price" id="heroPrice">$79.50 <small>$86.00</small></div>
    <button class="add-btn">Add to cart</button>

    <div class="size-btns">
      <button class="size-btn active">500</button>
      <button class="size-btn">250</button>
      <button class="size-btn">100</button>
    </div>

    <svg class="hero-bottle" viewBox="0 0 80 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="28" y="2" width="24" height="10" rx="3" fill="rgba(0,0,0,0.3)"/>
      <path d="M20 22 Q18 30 16 45 L16 140 Q16 150 24 152 L56 152 Q64 150 64 140 L64 45 Q62 30 60 22 Z"
            fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <path d="M22 60 L58 60 L58 140 Q58 146 52 147 L28 147 Q22 146 22 140 Z" fill="rgba(255,255,255,0.15)"/>
      <text x="40" y="98"  text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="8"  font-family="serif" font-weight="bold">ORANGE</text>
      <text x="40" y="110" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="6"  font-family="sans-serif">SMOOTHIE</text>
      <text x="40" y="122" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="5"  font-family="serif">MOCKUP</text>
      <text x="40" y="136" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8" font-family="serif" letter-spacing="2">drink</text>
    </svg>

    <div class="flavor-thumbs">
      <div class="thumb">🧡</div>
      <div class="thumb">🍓</div>
    </div>
  </div>

  <div class="products-section">
    <div class="section-meta">
      <div>
        <div class="section-label">Our Collection</div>
        <div class="section-title">All Flavours</div>
      </div>
    </div>
    <div class="cards-track" id="cardsTrack"></div>
    <div class="dots-row" id="dotsRow"></div>
  </div>

  <footer>© 2024 All rights reserved</footer>
</div>

<script>
  const products = [
    { num:"01", name:"Green\nSmoothie",      sub:"Gusto Flavour",     color:"#4CAF50", price:"$65.00", desc:"Fresh spinach, apple and ginger for a revitalizing daily boost." },
    { num:"02", name:"Berry\nSmoothie",      sub:"Delicious Flavour", color:"#C2185B", price:"$72.00", desc:"Mixed berries blended with coconut milk for a rich, sweet treat." },
    { num:"03", name:"Orange\nSmoothie",     sub:"Gusto Flavour",     color:"#E8621A", price:"$79.50", desc:"Experience the perfect blend of fresh oranges & creamy vanilla." },
    { num:"04", name:"Strawberry\nSmoothie", sub:"Gusto Flavour",     color:"#F44336", price:"$68.00", desc:"Sun-ripened strawberries with a hint of mint and honey." },
  ];

  const bgWords = ["blend","drink","drink","fresh"];
  let active = 2;

  const heroSection = document.getElementById('heroSection');
  const heroName    = document.getElementById('heroName');
  const heroDesc    = document.getElementById('heroDesc');
  const heroPrice   = document.getElementById('heroPrice');
  const heroNum     = document.getElementById('heroNum');
  const heroBgText  = document.getElementById('heroBgText');
  const track       = document.getElementById('cardsTrack');
  const dotsRow     = document.getElementById('dotsRow');

  /* Build bottle SVG per color */
  function bottleSVG(color) {
    return `
      <svg viewBox="0 0 80 160" fill="none" xmlns="http://www.w3.org/2000/svg" class="bottle-svg">
        <rect x="28" y="2" width="24" height="10" rx="3" fill="rgba(0,0,0,0.25)"/>
        <path d="M20 22 Q18 30 16 45 L16 140 Q16 150 24 152 L56 152 Q64 150 64 140 L64 45 Q62 30 60 22 Z"
              fill="${color}cc" stroke="${color}" stroke-width="1.5"/>
        <path d="M22 60 L58 60 L58 140 Q58 146 52 147 L28 147 Q22 146 22 140 Z" fill="rgba(255,255,255,0.12)"/>
        <text x="40" y="112" text-anchor="middle" fill="rgba(255,255,255,0.9)"
              font-size="8" font-family="serif" letter-spacing="1.5">drink</text>
      </svg>`;
  }

  /* Update hero panel */
  function setActive(i) {
    active = i;
    const p = products[i];
    heroSection.style.background = p.color;
    heroName.textContent  = p.name.replace('\n', ' ');
    heroDesc.textContent  = p.desc;
    heroPrice.innerHTML   = `${p.price} <small>$86.00</small>`;
    heroNum.textContent   = p.num;
    heroBgText.textContent = bgWords[i] || 'drink';

    document.querySelectorAll('.product-card').forEach((c, j) => {
      c.classList.toggle('active', j === i);
      c.style.background = j === i ? p.color : '';
    });
    document.querySelectorAll('.nav-dot').forEach((d, j) => {
      d.classList.toggle('active-dot', j === i);
    });
    document.querySelectorAll('.nav-dot.active-dot').forEach(d => {
      d.style.background = p.color;
    });
  }

  /* Build cards */
  products.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'product-card' + (i === active ? ' active' : '');
    if (i === active) card.style.background = p.color;
    card.innerHTML = `
      <div class="card-num">${p.num}</div>
      <div class="card-img-wrap">${bottleSVG(p.color)}</div>
      <div class="card-name">${p.name.replace('\n', '<br>')}</div>
      <div class="card-sub">${p.sub}</div>
      <div class="card-footer">
        <span class="view-btn">View more ›</span>
      </div>`;
    card.addEventListener('click', () => setActive(i));
    track.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'nav-dot' + (i === active ? ' active-dot' : '');
    if (i === active) dot.style.background = p.color;
    dot.addEventListener('click', () => setActive(i));
    dotsRow.appendChild(dot);
  });

  /* Theme color dots */
  const themeColors = products.map(p => p.color);
  themeColors.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 2 ? ' active' : '');
    d.style.background = c;
    d.addEventListener('click', () => {
      document.querySelectorAll('.dot').forEach(x => x.classList.remove('active'));
      d.classList.add('active');
      setActive(i);
    });
    document.getElementById('themeDots').appendChild(d);
  });

  /* Size buttons */
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    });
  });
</script>
</body>
</html>
